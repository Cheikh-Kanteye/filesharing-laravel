services:
  postgres:
    image: postgres:16-alpine
    container_name: filesharing_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: filesharing
      POSTGRES_USER: filesharing
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
